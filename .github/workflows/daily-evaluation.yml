name: Daily Evaluation (ProLevel + YouTube + X)

on:
  schedule:
    # 毎日 JST 10:00 (UTC 01:00) - 月初から9日間実行
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Evaluation month (YYYY-MM, leave empty for previous month)'
        required: false
        type: string
      day:
        description: 'Day number (1-9, leave empty for auto-detect)'
        required: false
        type: string

jobs:
  daily-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2時間タイムアウト
    
    steps:
      - name: Check if within first 9 days of month
        id: check_date
        run: |
          DAY_OF_MONTH=$(date +%d | sed 's/^0//')
          echo "day=$DAY_OF_MONTH" >> $GITHUB_OUTPUT
          
          if [ -n "${{ inputs.day }}" ]; then
            DAY_OF_MONTH="${{ inputs.day }}"
            echo "Using manual day: $DAY_OF_MONTH"
          fi
          
          if [ $DAY_OF_MONTH -le 9 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Within first 9 days of month, will run evaluation"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ Beyond day 9, skipping evaluation"
          fi
      
      - name: Wake up Render service
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          echo "🔥 Waking up Render service..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://vtuber-school-evaluation.onrender.com/api/health || echo "000")
            echo "Attempt $i/10: Status $STATUS"
            
            if [ "$STATUS" = "200" ]; then
              echo "✅ Service is ready!"
              break
            fi
            
            if [ $i -lt 10 ]; then
              sleep 10
            fi
          done
          
          sleep 5
      
      - name: Get evaluation month
        if: steps.check_date.outputs.should_run == 'true'
        id: get_month
        run: |
          if [ -n "${{ inputs.month }}" ]; then
            MONTH="${{ inputs.month }}"
          else
            MONTH=$(date -u -d "1 month ago" +%Y-%m)
          fi
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          echo "📅 Evaluating for month: $MONTH"
      
      - name: Calculate batch range for today
        if: steps.check_date.outputs.should_run == 'true'
        id: batch_range
        run: |
          DAY="${{ steps.check_date.outputs.day }}"

          # プロレベル: 1日あたり40バッチ（200人）
          PROLEVEL_BATCHES_PER_DAY=40

          # YouTube: 1日あたり16バッチ（80人）※クォータ制限対策
          YOUTUBE_BATCHES_PER_DAY=16

          # プロレベルのバッチ範囲
          PROLEVEL_START=$(( (DAY - 1) * PROLEVEL_BATCHES_PER_DAY ))
          PROLEVEL_END=$(( PROLEVEL_START + PROLEVEL_BATCHES_PER_DAY - 1 ))

          # YouTubeのバッチ範囲
          YOUTUBE_START=$(( (DAY - 1) * YOUTUBE_BATCHES_PER_DAY ))
          YOUTUBE_END=$(( YOUTUBE_START + YOUTUBE_BATCHES_PER_DAY - 1 ))

          # YouTubeは31バッチで完了（154人）
          YOUTUBE_TOTAL_BATCHES=31

          if [ $YOUTUBE_END -ge $YOUTUBE_TOTAL_BATCHES ]; then
            YOUTUBE_END=$(( YOUTUBE_TOTAL_BATCHES - 1 ))
            echo "youtube_completed=true" >> $GITHUB_OUTPUT
            echo "🎉 YouTube evaluation will be completed today (batch $YOUTUBE_START-$YOUTUBE_END)"
          else
            echo "youtube_completed=false" >> $GITHUB_OUTPUT
          fi

          echo "prolevel_start=$PROLEVEL_START" >> $GITHUB_OUTPUT
          echo "prolevel_end=$PROLEVEL_END" >> $GITHUB_OUTPUT
          echo "youtube_start=$YOUTUBE_START" >> $GITHUB_OUTPUT
          echo "youtube_end=$YOUTUBE_END" >> $GITHUB_OUTPUT
          echo "📊 Day $DAY: ProLevel batch $PROLEVEL_START-$PROLEVEL_END (200人), YouTube batch $YOUTUBE_START-$YOUTUBE_END (80人)"

      # ============================================
      # プロレベル評価のみ（200人/日、X・YouTube をスキップ）
      # ============================================

      - name: Process ProLevel evaluation batches (200/day)
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          MONTH="${{ steps.get_month.outputs.month }}"
          START_BATCH=${{ steps.batch_range.outputs.prolevel_start }}
          END_BATCH=${{ steps.batch_range.outputs.prolevel_end }}

          echo "🚀 Starting ProLevel evaluation for $MONTH"
          echo "Processing batches $START_BATCH to $END_BATCH (40 batches, 200 students)"

          for ((i=START_BATCH; i<=END_BATCH; i++)); do
            echo "============================================"
            echo "📦 Processing ProLevel Batch $i (Day ${{ steps.check_date.outputs.day }})"
            echo "============================================"

            MAX_RETRIES=3
            RETRY_COUNT=0
            SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
              if [ $RETRY_COUNT -gt 0 ]; then
                echo "⏳ Retry $RETRY_COUNT/$MAX_RETRIES after 30 seconds..."
                sleep 30
              fi

              # skipX=true, skipYouTube=true でプロレベルのみ評価（バッチサイズ5）
              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                -X POST \
                "https://vtuber-school-evaluation.onrender.com/api/auto-evaluate?month=$MONTH&batchIndex=$i&batchSize=5&skipX=true&skipYouTube=true")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
              BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS/d')

              echo "Response Status: $HTTP_STATUS"

              if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
                SUCCESS=true
                SUCCESS_COUNT=$(echo "$BODY" | jq -r '.successCount')
                ERROR_COUNT=$(echo "$BODY" | jq -r '.errorCount')
                SKIPPED_COUNT=$(echo "$BODY" | jq -r '.skippedCount')
                echo "✅ ProLevel Batch $i: Success=$SUCCESS_COUNT, Error=$ERROR_COUNT, Skipped=$SKIPPED_COUNT"
              else
                RETRY_COUNT=$((RETRY_COUNT+1))
                echo "::warning::ProLevel Batch $i failed with status $HTTP_STATUS (Attempt $RETRY_COUNT/$MAX_RETRIES)"
              fi
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "::error::ProLevel Batch $i failed after $MAX_RETRIES attempts"
            fi

            if [ $i -lt $END_BATCH ]; then
              echo "⏳ Waiting 5 seconds before next batch..."
              sleep 5
            fi
          done

          echo "✅ ProLevel evaluation completed for Day ${{ steps.check_date.outputs.day }}!"

      # ============================================
      # YouTube 評価のみ（80人/日、クォータ制限対策）
      # ============================================

      - name: Process YouTube evaluation batches (80/day)
        if: steps.check_date.outputs.should_run == 'true'
        run: |
          MONTH="${{ steps.get_month.outputs.month }}"
          START_BATCH=${{ steps.batch_range.outputs.youtube_start }}
          END_BATCH=${{ steps.batch_range.outputs.youtube_end }}

          echo "🚀 Starting YouTube evaluation for $MONTH"
          echo "Processing batches $START_BATCH to $END_BATCH (16 batches, 80 students)"

          for ((i=START_BATCH; i<=END_BATCH; i++)); do
            echo "============================================"
            echo "📦 Processing YouTube Batch $i (Day ${{ steps.check_date.outputs.day }})"
            echo "============================================"

            MAX_RETRIES=3
            RETRY_COUNT=0
            SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = "false" ]; do
              if [ $RETRY_COUNT -gt 0 ]; then
                echo "⏳ Retry $RETRY_COUNT/$MAX_RETRIES after 30 seconds..."
                sleep 30
              fi

              # skipX=true, skipProLevel=true でYouTubeのみ評価（バッチサイズ5）
              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                -X POST \
                "https://vtuber-school-evaluation.onrender.com/api/auto-evaluate?month=$MONTH&batchIndex=$i&batchSize=5&skipX=true&skipProLevel=true")

              HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
              BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS/d')

              echo "Response Status: $HTTP_STATUS"

              if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
                SUCCESS=true
                SUCCESS_COUNT=$(echo "$BODY" | jq -r '.successCount')
                ERROR_COUNT=$(echo "$BODY" | jq -r '.errorCount')
                SKIPPED_COUNT=$(echo "$BODY" | jq -r '.skippedCount')
                echo "✅ YouTube Batch $i: Success=$SUCCESS_COUNT, Error=$ERROR_COUNT, Skipped=$SKIPPED_COUNT"
              else
                RETRY_COUNT=$((RETRY_COUNT+1))
                echo "::warning::YouTube Batch $i failed with status $HTTP_STATUS (Attempt $RETRY_COUNT/$MAX_RETRIES)"
              fi
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "::error::YouTube Batch $i failed after $MAX_RETRIES attempts"
            fi

            # 次のバッチの前に待機（YouTube APIレート制限対策）
            if [ $i -lt $END_BATCH ]; then
              echo "⏳ Waiting 10 seconds before next batch..."
              sleep 10
            fi
          done

          echo "✅ YouTube evaluation completed for Day ${{ steps.check_date.outputs.day }}!"
      
      # ============================================
      # X評価（Day 1のみ実行）
      # ============================================
      
      - name: Check if Day 1 for X evaluation
        if: steps.check_date.outputs.should_run == 'true'
        id: check_day1
        run: |
          DAY="${{ steps.check_date.outputs.day }}"
          if [ "$DAY" = "1" ]; then
            echo "is_day1=true" >> $GITHUB_OUTPUT
            echo "✅ Day 1: Will run X evaluation"
          else
            echo "is_day1=false" >> $GITHUB_OUTPUT
            echo "⏭️ Not Day 1: Skipping X evaluation"
          fi
      
      - name: Reset X evaluation progress
        if: steps.check_day1.outputs.is_day1 == 'true'
        run: |
          MONTH="${{ steps.get_month.outputs.month }}"
          echo "🔄 Resetting X evaluation progress for $MONTH..."
          curl -s -X POST "https://vtuber-school-evaluation.onrender.com/api/auto-evaluate-x-only?reset=true&month=$MONTH" | jq '.'
      
      - name: Process X Evaluation Batches
        if: steps.check_day1.outputs.is_day1 == 'true'
        run: |
          MONTH="${{ steps.get_month.outputs.month }}"
          echo "🔄 Processing X Evaluation..."
          
          for BATCH_NUM in {0..5}; do
            echo "============================================"
            echo "📦 Processing X Batch $BATCH_NUM"
            echo "============================================"
            
            RESPONSE=$(curl -s -X POST "https://vtuber-school-evaluation.onrender.com/api/auto-evaluate-x-only?month=$MONTH")
            echo "$RESPONSE" | jq '.'
            
            IS_COMPLETED=$(echo "$RESPONSE" | jq -r '.progress.isCompleted')
            if [ "$IS_COMPLETED" = "true" ]; then
              echo "🎉 All X evaluations completed!"
              break
            fi
            
            COMPLETED=$(echo "$RESPONSE" | jq -r '.progress.completedStudents')
            TOTAL=$(echo "$RESPONSE" | jq -r '.progress.totalStudents')
            echo "✅ X Batch $BATCH_NUM completed: $COMPLETED/$TOTAL students"
            
            # 次のバッチの前に30分待機
            if [ $BATCH_NUM -lt 5 ]; then
              echo "⏳ Waiting 30 minutes before next X batch..."
              sleep 1800
            fi
          done
      
      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "📊 Daily Evaluation Summary"
          echo "============================================"
          echo "Date: $(date)"
          echo "Day: ${{ steps.check_date.outputs.day }}"
          echo "Month: ${{ steps.get_month.outputs.month }}"
          echo "ProLevel Batches: ${{ steps.batch_range.outputs.prolevel_start }} - ${{ steps.batch_range.outputs.prolevel_end }} (200人/日)"
          echo "YouTube Batches: ${{ steps.batch_range.outputs.youtube_start }} - ${{ steps.batch_range.outputs.youtube_end }} (80人/日)"
          echo "Status: Completed"
          echo "============================================"
